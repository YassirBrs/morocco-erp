services:
  postgres:
    image: postgres:16
    container_name: morocco-erp-postgres
    environment:
      POSTGRES_DB: morocco_erp
      POSTGRES_USER: morocco_erp
      POSTGRES_PASSWORD: morocco_erp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
