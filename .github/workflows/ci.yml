name: Morocco ERP CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: morocco_erp_test
          POSTGRES_USER: morocco_erp
          POSTGRES_PASSWORD: morocco_erp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U morocco_erp -d morocco_erp_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://morocco_erp:morocco_erp@localhost:5432/morocco_erp_test
      JWT_SECRET: ci-jwt-secret-change-me
      AUTH_SECRET: ci-auth-secret-change-me
      STORAGE_PROVIDER: LOCAL_DEV
      ALLOWED_ORIGINS: http://localhost:3001
      NEXT_PUBLIC_API_URL: http://localhost:3100
      NEXT_PUBLIC_TENANT_ID: tenant-demo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
      - name: Install backend
        run: npm ci
        working-directory: backend
      - name: Install frontend
        run: npm ci
        working-directory: frontend
      - name: Validate Prisma schema
        run: npx --yes prisma@5.22.0 validate --schema prisma/schema.prisma
        working-directory: backend
      - name: Build backend
        run: npm run build
        working-directory: backend
      - name: Build frontend
        run: npm run build
        working-directory: frontend
      - name: Backend tests
        run: npm test -- --runInBand
        working-directory: backend
      - name: Frontend tests
        run: npm test
        working-directory: frontend
      - name: Playwright smoke metadata
        run: node --test tests/*.test.mjs
        working-directory: frontend
